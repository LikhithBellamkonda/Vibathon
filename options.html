<!DOCTYPE html>
<html>
<head>
    <title>Vibathon AI Settings</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --danger: #ef4444;
            --success: #22c55e;
            --border: rgba(255,255,255,0.1);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 32px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid var(--border);
        }

        h2 {
            margin-top: 0;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--text-dim);
        }

        input[type="password"], input[type="text"] {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: rgba(0,0,0,0.2);
            color: var(--text);
            font-family: inherit;
            margin-bottom: 16px;
            box-sizing: border-box;
        }
        
        input:focus {
            outline: none;
            border-color: var(--primary);
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: var(--primary);
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            font-size: 1rem;
            transition: 0.2s;
        }

        button:hover {
            background: var(--primary-hover);
        }

        #status {
            margin-top: 16px;
            text-align: center;
            font-size: 0.9rem;
            min-height: 20px;
        }
        
        .success { color: var(--success); }
        .error { color: var(--danger); }
    </style>
</head>
<body>
    <div class="container">
        <h2>⚙️ Settings</h2>
        
        <div>
            <label for="apiKey">Gemini API Key</label>
            <input type="password" id="apiKey" placeholder="AIzaSy...">
        </div>
        
        <button id="saveBtn">Save Settings</button>
        <div id="status"></div>
    </div>
    <script src="options.js"></script>
</body>
</html>
